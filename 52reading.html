<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 閱讀小達人闖關挑戰 🌟</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f0fdf4; /* 淺綠色活潑背景 */
      background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
      background-size: 30px 30px;
    }
    .view-section { display: none; animation: fadeIn 0.4s ease-in-out; }
    .view-section.active { display: flex; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .btn-primary {
      background: linear-gradient(to bottom, #fde047, #eab308);
      box-shadow: 0 4px 0 #ca8a04, 0 8px 15px rgba(0,0,0,0.1);
      transition: all 0.1s;
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow: 0 0px 0 #ca8a04, 0 4px 5px rgba(0,0,0,0.1);
    }
    
    .btn-option {
      transition: all 0.2s;
      border: 2px solid #e5e7eb;
    }
    .btn-option:hover {
      border-color: #3b82f6;
      background-color: #eff6ff;
      transform: scale(1.02);
    }
    
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 4px solid #ffffff;
    }

    /* 閱讀文章重點標示樣式 */
    .passage-text {
      line-height: 2;
      font-size: 1.125rem;
      color: #374151;
    }
    .passage-text strong {
      background-color: #fef08a;
      padding: 2px 4px;
      border-radius: 4px;
      color: #1f2937;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- ================= [ 1. 首頁：輸入姓名 ] ================= -->
  <div id="home-view" class="view-section active flex-col items-center max-w-md w-full">
    <div class="text-6xl mb-4">📚</div>
    <h1 class="text-4xl font-black text-green-700 mb-2 text-center drop-shadow-sm">閱讀小達人</h1>
    <h2 class="text-xl font-bold text-green-600 mb-8 text-center">闖關挑戰賽</h2>
    
    <div class="card p-8 w-full text-center">
      <label class="block text-lg font-bold text-gray-700 mb-4">請輸入你的挑戰代號 (姓名)</label>
      <input type="text" id="player-name" placeholder="例如：王小明" 
             class="w-full text-center text-xl p-4 border-4 border-green-200 rounded-xl mb-6 focus:outline-none focus:border-green-500 focus:ring-4 focus:ring-green-100 transition-all">
      <button onclick="goToLevelSelect()" class="btn-primary w-full text-2xl font-black text-yellow-900 py-4 rounded-xl">
        開始挑戰！ 🚀
      </button>

      <!-- 新增：測驗紀錄檔連結 (教師用) -->
      <div class="mt-6 pt-4 border-t-2 border-dashed border-gray-100">
        <a href="https://docs.google.com/spreadsheets/d/1ieDt7UClFFhKaOTD-kljBEX7b76toR_TZ0JaiTeG9n8/edit?usp=sharing" target="_blank" class="inline-flex items-center justify-center gap-2 text-sm font-bold text-blue-500 hover:text-blue-700 transition-colors">
          <span>📊 查看所有測驗紀錄 (Google Sheets)</span>
        </a>
      </div>
    </div>
  </div>

  <!-- ================= [ 2. 關卡選擇 ] ================= -->
  <div id="level-select-view" class="view-section flex-col max-w-4xl w-full">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-black text-green-800">選擇挑戰關卡</h2>
      <div class="text-lg font-bold text-gray-600 bg-white px-4 py-2 rounded-full shadow-sm">
        👤 玩家：<span id="display-player-name" class="text-blue-600"></span>
      </div>
    </div>
    <div id="level-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- 關卡卡片由 JS 動態產生 -->
    </div>
  </div>

  <!-- ================= [ 3. 閱讀文章畫面 ] ================= -->
  <div id="reading-view" class="view-section flex-col max-w-3xl w-full">
    <div class="card p-6 md:p-10 w-full mb-6">
      <div class="flex justify-between items-center mb-6 border-b-2 border-gray-100 pb-4">
        <h2 id="reading-title" class="text-3xl font-black text-blue-700"></h2>
        <span class="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full">👀 仔細閱讀</span>
      </div>
      <div id="reading-passage" class="passage-text mb-8"></div>
      
      <button onclick="startQuiz()" class="btn-primary w-full text-2xl font-black text-yellow-900 py-4 rounded-xl flex items-center justify-center gap-2">
        <span>我讀懂了，開始作答！</span>
        <span class="text-3xl">⏱️</span>
      </button>
    </div>
  </div>

  <!-- ================= [ 4. 測驗作答畫面 ] ================= -->
  <div id="quiz-view" class="view-section flex-col max-w-2xl w-full">
    <div class="flex justify-between items-center mb-4">
      <div class="bg-white px-4 py-2 rounded-full shadow-sm font-bold text-gray-600 text-lg">
        題目：<span id="question-counter" class="text-blue-600">1 / 5</span>
      </div>
      <div class="bg-white px-4 py-2 rounded-full shadow-sm font-bold text-red-500 text-lg flex items-center gap-2">
        ⏱️ <span id="timer-display">0</span> 秒
      </div>
    </div>
    
    <div class="card p-6 md:p-8 w-full">
      <h3 id="question-text" class="text-2xl font-bold text-gray-800 mb-8 leading-snug"></h3>
      <div id="options-container" class="flex flex-col gap-4">
        <!-- 選項由 JS 動態產生 -->
      </div>
      
      <!-- 新增：解析區塊 -->
      <div id="explanation-box" class="mt-8 p-6 bg-red-50 border-2 border-red-200 rounded-xl hidden">
        <h4 class="text-lg font-bold text-red-600 mb-2">❌ 答錯囉！</h4>
        <p id="correct-answer-text" class="text-green-700 font-bold mb-2"></p>
        <p id="explanation-text" class="text-gray-700 leading-relaxed"></p>
        <button onclick="nextQuestion()" class="mt-4 w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-lg shadow transition-colors">
          看懂了，下一題 ➡️
        </button>
      </div>
    </div>
  </div>

  <!-- ================= [ 5. 測驗結果畫面 ] ================= -->
  <div id="result-view" class="view-section flex-col items-center max-w-md w-full">
    <div class="text-6xl mb-4" id="result-emoji">🏆</div>
    <h2 class="text-4xl font-black text-green-700 mb-6 text-center shadow-sm">挑戰完成！</h2>
    
    <div class="card p-8 w-full mb-6">
      <div class="text-center mb-6 pb-6 border-b-2 border-dashed border-gray-200">
        <div class="text-gray-500 font-bold mb-1">最終成績</div>
        <div id="final-score" class="text-6xl font-black text-blue-600">100</div>
      </div>
      
      <div class="grid grid-cols-2 gap-4 text-center mb-4">
        <div class="bg-green-50 p-4 rounded-xl">
          <div class="text-green-600 font-bold text-sm mb-1">答對題數</div>
          <div id="final-correct" class="text-3xl font-black text-green-700">0</div>
        </div>
        <div class="bg-red-50 p-4 rounded-xl">
          <div class="text-red-500 font-bold text-sm mb-1">答錯題數</div>
          <div id="final-wrong" class="text-3xl font-black text-red-600">0</div>
        </div>
      </div>
      
      <div class="bg-yellow-50 p-4 rounded-xl text-center">
        <div class="text-yellow-700 font-bold text-sm mb-1">挑戰耗時</div>
        <div class="text-2xl font-black text-yellow-800"><span id="final-time">0</span> 秒</div>
      </div>
    </div>

    <!-- 新增：錯題回顧區塊 -->
    <div id="wrong-review-section" class="card p-6 w-full mb-6 hidden">
      <h3 class="text-xl font-bold text-red-600 mb-4 border-b-2 border-red-100 pb-2">❌ 錯題與解析回顧</h3>
      <div id="wrong-review-list" class="flex flex-col gap-4 text-left">
        <!-- 錯題由 JS 產生 -->
      </div>
    </div>

    <div class="flex flex-col w-full gap-4">
      <button onclick="showLeaderboard()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold text-xl py-4 rounded-xl shadow-lg transition-all active:scale-95">
        📊 查看排行榜
      </button>
      <button onclick="goToLevelSelect()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold text-xl py-4 rounded-xl shadow transition-all active:scale-95">
        🔙 回到關卡列表
      </button>
    </div>
  </div>

  <!-- ================= [ 6. 排行榜畫面 ] ================= -->
  <div id="leaderboard-view" class="view-section flex-col max-w-2xl w-full">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-black text-blue-800">👑 閱讀達人排行榜</h2>
      <button onclick="goToLevelSelect()" class="bg-white px-4 py-2 rounded-full shadow font-bold text-gray-600 hover:bg-gray-50">
        返回
      </button>
    </div>
    
    <div class="card overflow-hidden w-full">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-blue-100 text-blue-800">
            <th class="p-4 font-bold text-center">名次</th>
            <th class="p-4 font-bold">姓名</th>
            <th class="p-4 font-bold text-center">關卡</th>
            <th class="p-4 font-bold text-center">分數</th>
            <th class="p-4 font-bold text-center">秒數</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body">
          <!-- 排行榜資料由 JS 產生 -->
        </tbody>
      </table>
      <div id="leaderboard-loading" class="p-8 text-center text-gray-500 font-bold hidden">
        🔄 讀取排行榜中...
      </div>
    </div>
  </div>

  <!-- ================= [ JavaScript 邏輯 ] ================= -->

            options: ["沒有米也要強顏歡笑", "米賣光了就很快樂", "心情放輕鬆，不要想太多", "沒有米煮飯，只好飲酒作樂"],
            answer: "心情放輕鬆，不要想太多",
            explanation: "文中崑濱伯解釋無米樂的意義：「隨興唱歌，心情放輕鬆，不要想太多，這叫做無米樂啦！」"
          },
          {
            question: "(甲)地震 (乙)颱風 (丙)病蟲害 (丁)農藥。以上四種災害，哪些是崑濱伯最擔心的事？",
            options: ["甲乙", "甲丙", "甲丁", "乙丙"],
            answer: "乙丙",
            explanation: "文中提到：「因為毫無預警的病蟲害和颱風，極有可能在一夕之間就把他們幾個月的心血破壞殆盡」。"
          },
          {
            question: "「大半個世紀以來」這句話透露出故事中的主角從事農耕已經超過多少年？",
            options: ["五十年", "四十年", "三十年", "二十年"],
            answer: "五十年",
            explanation: "一個世紀是一百年，大半個世紀約為五十年；且後文崑濱伯也親口說「種稻五十年」。"
          }
        ]
      }
    ];

    // -----------------------------------------------------
    // 遊戲狀態與變數
    // -----------------------------------------------------
    let playerName = "";
    let currentLevelData = null;
    let currentQuestionIndex = 0;
    
    // 統計資料
    let correctList = [];
    let wrongList = [];
    let wrongDetailsList = []; // 新增：紀錄詳細錯題資訊
    let startTime = 0;
    let timerInterval = null;
    let secondsElapsed = 0;

    // -----------------------------------------------------
    // 畫面切換邏輯
    // -----------------------------------------------------
    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }

    // 從首頁進入關卡選擇
    function goToLevelSelect() {
      const nameInput = document.getElementById('player-name').value.trim();
      if (!playerName && !nameInput) {
        alert("請先輸入你的姓名或代號喔！");
        return;
      }
      if (nameInput) playerName = nameInput;
      
      document.getElementById('display-player-name').innerText = playerName;
      renderLevelList();
      switchView('level-select-view');
    }

    // 渲染關卡卡片
    function renderLevelList() {
      const container = document.getElementById('level-list');
      container.innerHTML = "";
      
      readingLevels.forEach((level, index) => {
        const card = document.createElement('div');
        card.className = "card p-6 flex flex-col justify-between hover:shadow-lg transition-shadow cursor-pointer border-t-8 border-t-green-400";
        card.onclick = () => openReading(index);
        card.innerHTML = `
          <div>
            <div class="text-sm font-bold text-green-500 mb-2">第 ${level.level} 關</div>
            <h3 class="text-xl font-black text-gray-800 mb-4">${level.title}</h3>
            <p class="text-gray-500 text-sm mb-6 line-clamp-2">${level.passage.replace(/<[^>]*>?/gm, '')}</p>
          </div>
          <button class="bg-green-100 text-green-700 font-bold py-2 rounded-lg w-full group-hover:bg-green-500 group-hover:text-white transition-colors">
            進入閱讀 📖
          </button>
        `;
        container.appendChild(card);
      });
    }

    // 進入閱讀文章畫面
    function openReading(index) {
      currentLevelData = readingLevels[index];
      document.getElementById('reading-title').innerText = currentLevelData.title;
      document.getElementById('reading-passage').innerHTML = currentLevelData.passage;
      switchView('reading-view');
    }

    // 開始測驗與計時
    function startQuiz() {
      currentQuestionIndex = 0;
      correctList = [];
      wrongList = [];
      wrongDetailsList = []; // 重置錯題紀錄
      secondsElapsed = 0;
      
      // 啟動計時器
      document.getElementById('timer-display').innerText = "0";
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById('timer-display').innerText = secondsElapsed;
      }, 1000);

      renderQuestion();
      switchView('quiz-view');
    }

    // 渲染題目
    function renderQuestion() {
      const qData = currentLevelData.questions[currentQuestionIndex];
      const totalQ = currentLevelData.questions.length;
      
      document.getElementById('question-counter').innerText = `${currentQuestionIndex + 1} / ${totalQ}`;
      document.getElementById('question-text').innerText = qData.question;
      
      // 隱藏並清空解析區塊
      document.getElementById('explanation-box').classList.add('hidden');
      
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = "";
      
      qData.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = "btn-option bg-white text-left text-lg font-bold text-gray-700 p-4 rounded-xl w-full flex items-center gap-4 shadow-sm transition-all";
        btn.innerHTML = `<span class="bg-gray-100 text-gray-500 w-8 h-8 rounded-full flex items-center justify-center shrink-0 font-black">${['A','B','C','D'][idx]}</span> <span>${opt}</span>`;
        // 將選項值存在屬性中方便比對
        btn.dataset.option = opt;
        btn.onclick = () => checkAnswer(opt, btn);
        optionsContainer.appendChild(btn);
      });
    }

    // 檢查答案
    function checkAnswer(selectedOption, clickedBtn) {
      const qData = currentLevelData.questions[currentQuestionIndex];
      const qNumberLabel = `Q${currentQuestionIndex + 1}`;
      
      // 鎖定所有選項按鈕
      const allBtns = document.querySelectorAll('.btn-option');
      allBtns.forEach(b => {
        b.onclick = null;
        b.style.pointerEvents = 'none'; // 防止 hover 變化
      });
      
      if (selectedOption === qData.answer) {
        correctList.push(qNumberLabel);
        // 答對特效
        clickedBtn.classList.remove('bg-white', 'border-gray-200');
        clickedBtn.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
        clickedBtn.querySelector('span').classList.replace('bg-gray-100', 'bg-green-500');
        clickedBtn.querySelector('span').classList.replace('text-gray-500', 'text-white');
        
        // 答對自動下一題 (延遲 0.8 秒讓學生看清楚)
        setTimeout(() => {
          nextQuestion();
        }, 800);

      } else {
        wrongList.push(qNumberLabel);
        // 紀錄錯題詳細資訊
        wrongDetailsList.push({
          qNum: qNumberLabel,
          question: qData.question,
          userAnswer: selectedOption,
          correctAnswer: qData.answer,
          explanation: qData.explanation
        });

        // 標示錯誤選項
        clickedBtn.classList.remove('bg-white', 'border-gray-200');
        clickedBtn.classList.add('bg-red-50', 'border-red-500', 'text-red-800');
        clickedBtn.querySelector('span').classList.replace('bg-gray-100', 'bg-red-500');
        clickedBtn.querySelector('span').classList.replace('text-gray-500', 'text-white');
        
        // 標示正確選項
        allBtns.forEach(b => {
          if (b.dataset.option === qData.answer) {
            b.classList.remove('bg-white', 'border-gray-200');
            b.classList.add('bg-green-100', 'border-green-500', 'text-green-800');
            b.querySelector('span').classList.replace('bg-gray-100', 'bg-green-500');
            b.querySelector('span').classList.replace('text-gray-500', 'text-white');
          }
        });

        // 顯示解析區塊
        document.getElementById('correct-answer-text').innerText = `✅ 正確答案：${qData.answer}`;
        document.getElementById('explanation-text').innerText = `💡 解析：${qData.explanation}`;
        document.getElementById('explanation-box').classList.remove('hidden');
      }
    }

    // 換下一題邏輯抽離
    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < currentLevelData.questions.length) {
        renderQuestion();
      } else {
        finishQuiz();
      }
    }

    // 完成測驗、計算成績與上傳資料
    function finishQuiz() {
      clearInterval(timerInterval);
      
      const totalQ = currentLevelData.questions.length;
      const correctCount = correctList.length;
      const wrongCount = wrongList.length;
      const score = Math.round((correctCount / totalQ) * 100);
      
      // 更新畫面
      document.getElementById('final-score').innerText = score;
      document.getElementById('final-correct').innerText = correctCount;
      document.getElementById('final-wrong').innerText = wrongCount;
      document.getElementById('final-time').innerText = secondsElapsed;
      
      const emoji = document.getElementById('result-emoji');
      if (score === 100) emoji.innerText = "🏆";
      else if (score >= 80) emoji.innerText = "⭐";
      else if (score >= 60) emoji.innerText = "👍";
      else emoji.innerText = "💪";

      // 渲染錯題回顧
      const reviewSection = document.getElementById('wrong-review-section');
      const reviewList = document.getElementById('wrong-review-list');
      reviewList.innerHTML = "";
      
      if (wrongDetailsList.length > 0) {
        reviewSection.classList.remove('hidden');
        wrongDetailsList.forEach(item => {
          const div = document.createElement('div');
          div.className = "bg-white p-4 rounded-lg border-l-4 border-red-400 shadow-sm";
          div.innerHTML = `
            <div class="font-bold text-gray-800 mb-2">${item.qNum}. ${item.question}</div>
            <div class="text-sm text-red-600 mb-1">❌ 你的答案：${item.userAnswer}</div>
            <div class="text-sm text-green-700 font-bold mb-2">✅ 正確答案：${item.correctAnswer}</div>
            <div class="text-sm text-gray-600 bg-gray-50 p-3 rounded">💡 解析：${item.explanation}</div>
          `;
          reviewList.appendChild(div);
        });
      } else {
        reviewSection.classList.add('hidden');
      }

      switchView('result-view');

      // 將錯題紀錄整理成文字，供 GAS 儲存
      const wrongDetailsText = wrongDetailsList.map(item => 
        `[${item.qNum}] 誤選: ${item.userAnswer} (正解: ${item.correctAnswer})`
      ).join(" | ");

      // 準備要送出的資料格式
      const payload = {
        timestamp: new Date().toLocaleString('zh-TW'),
        playerName: playerName,
        level: currentLevelData.title,
        correctQuestions: correctList.join(", ") || "無",
        wrongQuestions: wrongList.join(", ") || "無",
        correctCount: correctCount,
        wrongCount: wrongCount,
        score: score,
        duration: secondsElapsed,
        wrongDetails: wrongDetailsText || "全對無錯題" // 新增送出詳細錯誤紀錄
      };

      // 儲存到 LocalStorage (模擬資料庫用)
      saveToLocalLeaderboard(payload);

      // 傳送資料到 Google Sheets
      if (GAS_WEB_APP_URL) {
        fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } // 避免 GAS CORS 問題
        }).then(res => console.log("上傳成功"))
          .catch(err => console.error("上傳失敗", err));
      }
    }

    // -----------------------------------------------------
    // 排行榜功能 (支援 LocalStorage 模擬 與 GAS 遠端抓取)
    // -----------------------------------------------------
    function saveToLocalLeaderboard(data) {
      let records = JSON.parse(localStorage.getItem('readingQuizRecords') || '[]');
      records.push(data);
      localStorage.setItem('readingQuizRecords', JSON.stringify(records));
    }

    function showLeaderboard() {
      switchView('leaderboard-view');
      const tbody = document.getElementById('leaderboard-body');
      const loading = document.getElementById('leaderboard-loading');
      
      tbody.innerHTML = "";
      
      if (!GAS_WEB_APP_URL) {
        // 使用本地資料模擬
        let records = JSON.parse(localStorage.getItem('readingQuizRecords') || '[]');
        renderLeaderboardTable(records);
      } else {
        // 從 GAS 獲取資料
        loading.classList.remove('hidden');
        fetch(GAS_WEB_APP_URL)
          .then(res => res.json())
          .then(data => {
            loading.classList.add('hidden');
            renderLeaderboardTable(data);
          })
          .catch(err => {
            loading.classList.add('hidden');
            tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">無法讀取排行榜資料</td></tr>`;
          });
      }
    }

    function renderLeaderboardTable(records) {
      const tbody = document.getElementById('leaderboard-body');
      
      // 排序：先比分數(高到低)，再比時間(少到多)
      records.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.duration - b.duration;
      });

      // 只取前 10 名
      const top10 = records.slice(0, 10);
      
      if (top10.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500">目前還沒有人挑戰喔！</td></tr>`;
        return;
      }

      top10.forEach((record, idx) => {
        let rankIcon = idx + 1;
        if (idx === 0) rankIcon = "🥇";
        if (idx === 1) rankIcon = "🥈";
        if (idx === 2) rankIcon = "🥉";

        const tr = document.createElement('tr');
        tr.className = "border-b border-gray-100 hover:bg-gray-50 transition-colors";
        tr.innerHTML = `
          <td class="p-4 text-center font-black text-xl text-gray-700">${rankIcon}</td>
          <td class="p-4 font-bold text-gray-800">${record.playerName}</td>
          <td class="p-4 text-center text-sm text-gray-500">${record.level}</td>
          <td class="p-4 text-center font-black text-blue-600">${record.score}</td>
          <td class="p-4 text-center text-gray-600">${record.duration} 秒</td>
        `;
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
