<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五下成語闖關大挑戰 🚀</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5', // Indigo-600
                        secondary: '#F59E0B', // Amber-500
                        success: '#22C55E', // Green-500
                        danger: '#EF4444', // Red-500
                        bgColor: '#F0F9FF', // Sky-50
                    },
                    animation: {
                        'bounce-short': 'bounce 0.5s ease-in-out 2',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        pop: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Comic Sans MS', 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #F0F9FF; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 4px solid white; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.1); }
        .btn-press { transition: transform 0.1s; box-shadow: 0 6px 0 #3730A3; }
        .btn-press:active { transform: translateY(6px); box-shadow: 0 0 0 #3730A3; }
        .char-slot { width: 80px; height: 80px; border: 4px dashed #CBD5E1; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; color: #4F46E5; }
        .combo-text { background: linear-gradient(to right, #F59E0B, #EF4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loading-spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid white; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 設定與題庫
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwWbpVM-60wd4uTSKHyowk-TUJ97SU20ZtazfOBSOcmL0T6dovMW2G-vYzo7IxcJrVv_A/exec"; // 請填入部署後的網址
        const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/1Zg4ZIkCg7O-cDIqJh6l1VMK3mz-95iLlLxsouu4ylRI/edit?usp=sharing";

        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                const now = ctx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else if (type === 'combo') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554.37, now + 0.1);
                    osc.frequency.setValueAtTime(659.25, now + 0.2);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                }
            } catch (e) {
                console.error("音頻播放錯誤:", e);
            }
        };
        
        const LEVELS = [
            { id: 1, name: "第一關", title: "初出茅廬", color: "bg-blue-400", desc: "第一課成語" },
            { id: 2, name: "第二關", title: "漸入佳境", color: "bg-green-400", desc: "第二課成語" },
            { id: 3, name: "第三關", title: "得心應手", color: "bg-yellow-400", desc: "第三課成語" },
            { id: 4, name: "第四關", title: "融會貫通", color: "bg-orange-400", desc: "第四課成語" },
            { id: 5, name: "第五關", title: "爐火純青", color: "bg-red-400", desc: "第五課成語" },
            { id: 6, name: "第六關", title: "一代宗師", color: "bg-purple-400", desc: "第六課成語" }
        ];

        const IDIOM_DB = {
            1: [
                { text: "揮灑自如", meaning: "形容寫作、畫畫或做事順手，不受拘束。", typo: "揮撒自如", typoChar: "撒", correctChar: "灑", context: "這場書法比賽中，他寫得______，令人驚嘆。", antonym: "縛手縛腳", correctSentence: "他在舞台上表演得揮灑自如，完全不緊張。", wrongSentence: "他一遇到困難就揮灑自如，不知所措。" },
                { text: "懸壺濟世", meaning: "比喻行醫救人。", typo: "懸胡濟世", typoChar: "胡", correctChar: "壺", context: "王醫師一生______，救治了無數貧病交迫的窮人。", antonym: "見死不救", correctSentence: "老中醫懸壺濟世，深得鎮上居民敬重。", wrongSentence: "他為了賺錢不擇手段，真是懸壺濟世。" },
                { text: "魂不附體", meaning: "形容受到極大驚嚇，神智失去控制。", typo: "魂不付體", typoChar: "付", correctChar: "附", context: "突然一聲巨響，嚇得他______，呆立在原地。", antonym: "神色自若", correctSentence: "那場車禍讓他嚇得魂不附體，久久無法言語。", wrongSentence: "他考試考了滿分，高興得魂不附體。" },
                { text: "飲水思源", meaning: "比喻不忘本。", typo: "飲水思原", typoChar: "原", correctChar: "源", context: "做人要______，不能忘記曾經幫助過我們的人。", antonym: "過河拆橋", correctSentence: "母校校慶時，許多校友飲水思源，紛紛捐款回饋。", wrongSentence: "他總是不擇手段陷害朋友，真是個飲水思源的人。" }
            ],
            2: [
                { text: "易如反掌", meaning: "比喻事情非常容易做到。", typo: "易如反長", typoChar: "長", correctChar: "掌", context: "這點小事對他來說簡直是______。", antonym: "難如登天", correctSentence: "以他的實力，要贏得這場比賽簡直易如反掌。", wrongSentence: "這道數學題太難了，對我來說真是易如反掌。" },
                { text: "五彩繽紛", meaning: "形容色彩鮮豔繁多。", typo: "五彩賓紛", typoChar: "賓", correctChar: "繽", context: "春天的花園裡開滿了______的花朵。", antonym: "黯淡無光", correctSentence: "煙火秀將夜空點綴得五彩繽紛。", wrongSentence: "他的房間只有黑白兩色，真是五彩繽紛。" }
            ],
            3: [
                { text: "一頭霧水", meaning: "比喻令人困惑、不解。", typo: "一頭誤水", typoChar: "誤", correctChar: "霧", context: "老師講的這段理論太深奧，我們聽得______。", antonym: "豁然開朗", correctSentence: "這份說明書寫得很混亂，讓我看了一頭霧水。", wrongSentence: "他把事情解釋得很清楚，讓我一頭霧水。" }
            ],
            4: [
                { text: "作賊心虛", meaning: "做壞事怕人知道而心神不寧。", typo: "做賊心虛", typoChar: "做", correctChar: "作", context: "他偷了東西後，看到警察就______地逃跑了。", antonym: "理直氣壯", correctSentence: "他因為說謊而作賊心虛，不敢直視老師的眼睛。", wrongSentence: "他見義勇為，作賊心虛地接受了表揚。" }
            ],
            5: [
                { text: "良藥苦口", meaning: "能治病的藥多味苦。比喻諫言多不順耳，但有益於人。", typo: "涼藥苦口", typoChar: "涼", correctChar: "良", context: "老師的批評雖然嚴厲，但______，是為了你好。", antonym: "甜言蜜語", correctSentence: "朋友的勸告雖然不好聽，但良藥苦口，我應該接受。", wrongSentence: "這杯果汁真好喝，簡直是良藥苦口。" }
            ],
            6: [
                { text: "勤能補拙", meaning: "勤奮努力可以彌補天資的不足。", typo: "勤能補拙", typoChar: "捉", correctChar: "拙", context: "雖然我不夠聰明，但我相信______，只要努力就能進步。", antonym: "江郎才盡", correctSentence: "他靠著每天苦練，終於證明了勤能補拙的道理。", wrongSentence: "他因為太聰明了，所以勤能補拙。" }
            ]
        };

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const renderHighlight = (text) => {
            if (!text) return null;
            const parts = text.split(/(「[^」]+」|【[^】]+】)/g);
            return parts.map((part, i) => {
                if (part.startsWith('「') || part.startsWith('【')) {
                    return <span key={i} className="text-secondary font-black text-[120%] mx-1 bg-yellow-100 px-2 rounded-xl shadow-sm border-b-4 border-yellow-200">{part}</span>;
                }
                return <span key={i}>{part}</span>;
            });
        };

        const generateQuestions = (levelId) => {
            const idioms = IDIOM_DB[levelId] || IDIOM_DB[1];
            let questions = [];
            
            idioms.forEach(idiom => {
                questions.push({
                    type: 'flash', idiom: idiom.text, meaning: idiom.meaning,
                    question: `請問「${idiom.text}」的意思是？`,
                    options: shuffleArray([idiom.meaning, "形容做事非常快速。", "比喻不聽從別人的建議。"]).slice(0,3),
                    answer: idiom.meaning
                });
                questions.push({
                    type: 'context', question: idiom.context.replace('______', '【______】'),
                    options: shuffleArray([idiom.text, "一席之地", "不知所云", "不疾不徐"]).slice(0,4),
                    answer: idiom.text
                });
                questions.push({
                    type: 'scramble', question: `請將下列文字重組成【正確的成語】：`,
                    chars: shuffleArray(idiom.text.split('')),
                    answer: idiom.text
                });
            });

            return shuffleArray(questions).slice(0, 8);
        };

        // ==========================================
        // 3. React 元件
        // ==========================================
        const App = () => {
            const [gameState, setGameState] = React.useState('login'); 
            const [userInfo, setUserInfo] = React.useState({ name: '' });
            const [currentLevel, setCurrentLevel] = React.useState(null);
            const [questions, setQuestions] = React.useState([]);
            const [qIndex, setQIndex] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [wrongCount, setWrongCount] = React.useState(0);
            const [combo, setCombo] = React.useState(0);
            const [maxCombo, setMaxCombo] = React.useState(0);
            const [stars, setStars] = React.useState(0);
            const [timeElapsed, setTimeElapsed] = React.useState(0);
            const [flashState, setFlashState] = React.useState('none');
            const [selectedChars, setSelectedChars] = React.useState([]);
            const [feedback, setFeedback] = React.useState(null); 
            const [isSaving, setIsSaving] = React.useState(false);

            const timerRef = React.useRef(null);

            React.useEffect(() => {
                if (gameState === 'playing' && flashState !== 'showing' && !feedback) {
                    timerRef.current = setInterval(() => setTimeElapsed(t => t + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [gameState, flashState, feedback]);

            React.useEffect(() => {
                if (gameState === 'playing' && questions[qIndex]?.type === 'flash' && flashState === 'none') {
                    setFlashState('showing');
                    setTimeout(() => setFlashState('answering'), 3000);
                }
            }, [gameState, qIndex, questions]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!userInfo.name) return;
                setGameState('levelSelect');
            };

            const startLevel = (levelId) => {
                const qs = generateQuestions(levelId);
                setQuestions(qs);
                setCurrentLevel(levelId);
                setQIndex(0);
                setScore(0);
                setWrongCount(0);
                setCombo(0);
                setMaxCombo(0);
                setStars(0);
                setTimeElapsed(0);
                setFlashState('none');
                setSelectedChars([]);
                setFeedback(null);
                setGameState('playing');
            };

            const handleAnswer = (selectedAns) => {
                if (feedback) return;
                const currentQ = questions[qIndex];
                const isCorrect = selectedAns === currentQ.answer;

                setFeedback(isCorrect ? 'correct' : 'wrong');
                
                if (isCorrect) {
                    playSound('correct');
                    setScore(s => s + 1);
                    setCombo(c => {
                        const newCombo = c + 1;
                        if (newCombo > maxCombo) setMaxCombo(newCombo);
                        if (newCombo >= 3) playSound('combo');
                        return newCombo;
                    });
                    setStars(s => s + (combo >= 2 ? 2 : 1));
                } else {
                    playSound('wrong');
                    setWrongCount(w => w + 1);
                    setCombo(0);
                }

                setTimeout(() => {
                    setFeedback(null);
                    setSelectedChars([]);
                    if (qIndex < questions.length - 1) {
                        setQIndex(prev => prev + 1);
                        setFlashState('none');
                    } else {
                        finishGame();
                    }
                }, 1200);
            };

            const handleScrambleClick = (char, index) => {
                if (selectedChars.length < questions[qIndex].answer.length) {
                    setSelectedChars([...selectedChars, {char, index}]);
                }
            };
            
            const handleScrambleRemove = (selectedIndex) => {
                setSelectedChars(selectedChars.filter((_, i) => i !== selectedIndex));
            };

            React.useEffect(() => {
                if (gameState === 'playing' && questions[qIndex]?.type === 'scramble' && !feedback) {
                    if (selectedChars.length === questions[qIndex].answer.length) {
                        const word = selectedChars.map(c => c.char).join('');
                        handleAnswer(word);
                    }
                }
            }, [selectedChars]);

            const finishGame = async () => {
                setGameState('result');
                setIsSaving(true);
                
                const payload = {
                    name: userInfo.name,
                    level: `第 ${currentLevel} 關`,
                    score: score + (feedback === 'correct' ? 1 : 0), // 修正最後一題未加到分
                    wrong: wrongCount + (feedback === 'wrong' ? 1 : 0),
                    duration: timeElapsed
                };

                try {
                    await fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                } catch (e) {
                    console.error("發送資料失敗:", e);
                } finally {
                    setIsSaving(false);
                }
            };

            if (gameState === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-card rounded-[2rem] p-10 max-w-lg w-full text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-40 bg-primary rounded-b-[50%] -z-10 transform -translate-y-20"></div>
                            <i className="fa-solid fa-book-open mx-auto text-white text-[5rem] mb-8 relative z-10 -mt-2"></i>
                            <h1 className="text-5xl font-black text-primary mb-4 tracking-wider">成語大挑戰</h1>
                            <p className="text-gray-500 mb-10 text-xl font-bold bg-indigo-50 inline-block px-4 py-2 rounded-full border border-indigo-100">五下專屬 ‧ 作答紀錄版</p>
                            
                            <form onSubmit={handleLogin} className="space-y-8">
                                <div className="w-full">
                                    <label className="block text-left text-2xl font-bold text-gray-700 mb-3 ml-2">玩家姓名</label>
                                    <input type="text" required className="w-full p-5 rounded-2xl border-4 border-indigo-100 focus:border-primary focus:ring-4 outline-none text-3xl font-black text-gray-700 text-center shadow-inner"
                                        value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} placeholder="請輸入姓名" />
                                </div>
                                <button type="submit" className="w-full bg-primary text-white font-black text-3xl py-5 rounded-2xl btn-press flex justify-center items-center gap-3">
                                    <i className="fa-solid fa-rocket"></i> 開始闖關
                                </button>
                                <a href={SPREADSHEET_URL} target="_blank" className="block text-indigo-500 font-bold text-xl hover:underline mt-4">
                                    <i className="fa-solid fa-table-list mr-2"></i> 觀看 Google 紀錄表
                                </a>
                            </form>
                        </div>
                    </div>
                );
            }

            if (gameState === 'levelSelect') {
                return (
                    <div className="min-h-screen p-6 pb-20">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex justify-between items-center mb-10 bg-white p-5 rounded-3xl shadow-sm border-4 border-indigo-50">
                                <div className="flex items-center gap-4">
                                    <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center shadow-inner">
                                        <i className="fa-solid fa-user text-3xl text-primary"></i>
                                    </div>
                                    <div className="text-left">
                                        <div className="text-lg text-gray-500 font-bold">挑戰者</div>
                                        <div className="font-black text-3xl text-gray-800">{userInfo.name}</div>
                                    </div>
                                </div>
                                <button onClick={() => setGameState('login')} className="text-gray-400 hover:text-danger text-xl font-bold px-4 py-2 hover:bg-red-50 rounded-xl transition-colors">登出</button>
                            </div>

                            <h2 className="text-4xl font-black text-center text-primary mb-10 flex justify-center items-center gap-3 tracking-wide">
                                <i className="fa-solid fa-map text-4xl"></i> 選擇關卡
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {LEVELS.map((lvl) => (
                                    <button key={lvl.id} onClick={() => startLevel(lvl.id)} 
                                        className={`glass-card p-8 rounded-[2rem] text-left btn-press relative overflow-hidden group border-4 border-white`}>
                                        <div className={`absolute top-0 right-0 w-32 h-32 rounded-bl-full -mr-6 -mt-6 opacity-20 transition-transform group-hover:scale-110 ${lvl.color}`}></div>
                                        <div className={`w-20 h-20 rounded-[1.5rem] flex items-center justify-center text-white mb-6 shadow-xl ${lvl.color}`}>
                                            <span className="text-4xl font-black">{lvl.id}</span>
                                        </div>
                                        <h3 className="text-3xl font-black text-gray-800 mb-2">{lvl.title}</h3>
                                        <p className="text-gray-500 font-bold text-xl">{lvl.desc}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'playing') {
                const currentQ = questions[qIndex];
                const progress = ((qIndex) / questions.length) * 100;

                return (
                    <div className="min-h-screen flex flex-col bg-bgColor">
                        <div className="bg-white p-5 shadow-sm border-b-4 border-indigo-100 flex justify-between items-center sticky top-0 z-20">
                            <div className="flex flex-col text-left">
                                <span className="text-base text-gray-400 font-bold bg-gray-100 px-3 py-1 rounded-full inline-block mb-1 w-max">第 {currentLevel} 關</span>
                                <span className="font-black text-primary text-2xl tracking-wide">題號 {qIndex + 1} / {questions.length}</span>
                            </div>
                            
                            {combo >= 2 && (
                                <div className="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2 animate-bounce">
                                    <i className="fa-solid fa-fire text-danger text-3xl"></i>
                                    <span className="font-black text-3xl combo-text italic">{combo} 連擊!</span>
                                </div>
                            )}

                            <div className="flex gap-4 items-center">
                                <div className="flex items-center gap-2 bg-yellow-100 text-yellow-600 px-4 py-2 rounded-2xl font-black text-xl border-2 border-yellow-200">
                                    <i className="fa-solid fa-star text-yellow-600"></i> {stars}
                                </div>
                                <div className="hidden md:flex items-center gap-2 text-gray-500 font-bold font-mono text-xl bg-gray-50 px-4 py-2 rounded-2xl border-2 border-gray-100">
                                    <i className="fa-solid fa-clock text-indigo-400"></i> {Math.floor(timeElapsed / 60)}:{(timeElapsed % 60).toString().padStart(2, '0')}
                                </div>
                            </div>
                        </div>

                        <div className="h-4 bg-indigo-100 w-full">
                            <div className="h-full bg-success transition-all duration-500 ease-out rounded-r-full shadow-inner" style={{ width: `${progress}%` }}></div>
                        </div>

                        <div className="flex-1 p-6 md:p-10 flex items-center justify-center relative">
                            {feedback && (
                                <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/70 backdrop-blur-sm animate-pop">
                                    <div className="text-center">
                                        {feedback === 'correct' ? (
                                            <div className="bg-success text-white w-40 h-40 rounded-full flex items-center justify-center mx-auto shadow-2xl border-8 border-green-200">
                                                <i className="fa-solid fa-check text-7xl"></i>
                                            </div>
                                        ) : (
                                            <div className="bg-danger text-white w-40 h-40 rounded-full flex items-center justify-center mx-auto shadow-2xl border-8 border-red-200">
                                                <i className="fa-solid fa-xmark text-7xl"></i>
                                            </div>
                                        )}
                                        <h2 className={`text-6xl font-black mt-8 tracking-widest ${feedback === 'correct' ? 'text-success' : 'text-danger'}`}>
                                            {feedback === 'correct' ? '太棒了！' : '哎呀，錯了！'}
                                        </h2>
                                    </div>
                                </div>
                            )}

                            <div className="w-full max-w-4xl">
                                {currentQ.type === 'flash' && (
                                    <div className="text-center">
                                        {flashState === 'showing' ? (
                                            <div className="glass-card p-10 md:p-16 rounded-[3rem] animate-pulse-fast border-secondary border-8">
                                                <div className="inline-block bg-secondary text-white px-6 py-2 rounded-full font-black text-xl mb-10">快閃記憶</div>
                                                <h2 className="text-6xl md:text-[6rem] font-black text-primary tracking-widest mb-10">{currentQ.idiom}</h2>
                                                <p className="text-2xl md:text-4xl text-gray-700 font-bold bg-indigo-50 p-6 md:p-8 rounded-3xl border-4 border-indigo-100 leading-relaxed shadow-inner">{currentQ.meaning}</p>
                                            </div>
                                        ) : (
                                            <div className="animate-pop">
                                                <h3 className="text-3xl font-black text-gray-800 mb-8 bg-white p-6 rounded-3xl shadow-sm border-2 border-indigo-50 inline-block text-center w-full">{renderHighlight(currentQ.question)}</h3>
                                                <div className="space-y-4">
                                                    {currentQ.options.map((opt, i) => (
                                                        <button key={i} onClick={() => handleAnswer(opt)} className="w-full text-left p-6 glass-card rounded-3xl font-bold text-2xl text-gray-700 btn-press flex items-center gap-6 border-4 border-transparent hover:bg-indigo-50">
                                                            <div className="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-primary text-2xl shrink-0">{String.fromCharCode(65+i)}</div>
                                                            <span className="leading-snug">{opt}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentQ.type === 'context' && (
                                    <div className="animate-pop">
                                        <div className="mb-10 bg-white p-8 rounded-3xl shadow-sm border-4 border-indigo-50 text-center">
                                            <h3 className="text-3xl md:text-5xl font-black text-gray-800 leading-snug">{renderHighlight(currentQ.question)}</h3>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {currentQ.options.map((opt, i) => (
                                                <button key={i} onClick={() => handleAnswer(opt)} className="p-6 glass-card rounded-3xl font-bold text-3xl text-gray-700 btn-press flex items-center gap-6 hover:bg-indigo-50">
                                                    <div className="w-12 h-12 shrink-0 rounded-full bg-indigo-100 flex items-center justify-center text-primary text-2xl">{String.fromCharCode(65+i)}</div>
                                                    <span>{opt}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {currentQ.type === 'scramble' && (
                                    <div className="animate-pop text-center">
                                        <h3 className="text-3xl font-black text-gray-800 mb-10 bg-white p-6 rounded-3xl shadow-sm border-2 border-indigo-50 inline-block text-center w-full">{renderHighlight(currentQ.question)}</h3>
                                        <div className="flex justify-center gap-3 md:gap-6 mb-12">
                                            {Array.from({length: currentQ.answer.length}).map((_, i) => (
                                                <button key={`slot-${i}`} onClick={() => handleScrambleRemove(i)} className={`char-slot transition-all ${selectedChars[i] ? 'border-solid border-primary bg-indigo-50 border-4' : 'bg-white'}`}>
                                                    {selectedChars[i] ? selectedChars[i].char : ''}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="flex justify-center flex-wrap gap-4 md:gap-6 bg-white p-8 rounded-[3rem] shadow-sm">
                                            {currentQ.chars.map((char, i) => {
                                                const isSelected = selectedChars.some(sc => sc.index === i);
                                                return (
                                                    <button key={`char-${i}`} disabled={isSelected} onClick={() => handleScrambleClick(char, i)}
                                                        className={`w-20 h-20 md:w-24 md:h-24 rounded-[1.5rem] md:rounded-[2rem] text-4xl md:text-5xl font-black flex items-center justify-center border-b-8 ${isSelected ? 'bg-gray-100 text-gray-300 border-gray-200 translate-y-2' : 'bg-primary text-white border-indigo-800 shadow-xl'}`}>
                                                        {char}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (gameState === 'result') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-card rounded-[3rem] p-10 max-w-2xl w-full text-center border-8 border-white">
                            <div className="mx-auto w-40 h-40 bg-gradient-to-tr from-yellow-400 to-yellow-200 rounded-full flex items-center justify-center mb-8 shadow-2xl animate-bounce">
                                <i className="fa-solid fa-medal text-white text-6xl"></i>
                            </div>
                            <h1 className="text-5xl md:text-6xl font-black text-gray-800 mb-4 tracking-wider">挑戰完畢！</h1>
                            
                            <div className="grid grid-cols-2 gap-6 mb-8 mt-10">
                                <div className="bg-white p-6 rounded-3xl border-4 border-green-100">
                                    <div className="text-green-500 text-xl font-black mb-2">答對題數</div>
                                    <div className="text-5xl font-black text-gray-800">{score}</div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border-4 border-red-100">
                                    <div className="text-red-500 text-xl font-black mb-2">錯誤題數</div>
                                    <div className="text-5xl font-black text-gray-800">{wrongCount}</div>
                                </div>
                            </div>

                            <div className="mb-10 text-xl font-bold text-gray-500 flex items-center justify-center gap-2">
                                <i className="fa-solid fa-stopwatch"></i>
                                總共花費：{Math.floor(timeElapsed / 60)} 分 {(timeElapsed % 60)} 秒
                            </div>

                            {isSaving ? (
                                <div className="w-full bg-gray-200 text-gray-500 font-black text-2xl py-5 rounded-2xl flex justify-center items-center gap-3">
                                    <div className="loading-spinner border-t-indigo-500"></div>
                                    成績上傳中...
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4">
                                    <button onClick={() => setGameState('levelSelect')} className="w-full bg-primary text-white font-black text-2xl py-5 rounded-2xl btn-press">
                                        繼續挑戰其他關卡
                                    </button>
                                    <a href={SPREADSHEET_URL} target="_blank" className="w-full bg-success text-white font-black text-2xl py-5 rounded-2xl btn-press flex justify-center items-center gap-3">
                                        <i className="fa-solid fa-file-excel"></i> 檢查紀錄表
                                    </a>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
