<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五下成語與閱讀大挑戰 🚀 整合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#F59E0B',
                        success: '#22C55E',
                        danger: '#EF4444',
                        paper: '#FFFBEB', // 淡黃色課本感
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-press { transition: transform 0.1s; }
        .btn-press:active { transform: translateY(4px); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #FEF3C7; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #FDE68A; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 1. 基本設定 (請填入您的 GAS 網址)
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwWbpVM-60wd4uTSKHyowk-TUJ97SU20ZtazfOBSOcmL0T6dovMW2G-vYzo7IxcJrVv_A/exec"; 
        const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/1Zg4ZIkCg7O-cDIqJh6l1VMK3mz-95iLlLxsouu4ylRI/edit?usp=sharing";

        // ==========================================
        // 2. 題庫資料 (含原有成語與新增閱讀)
        // ==========================================
        
        // --- 原有成語題庫 (簡化結構供展示，實際開發時可放入完整版) ---
        const IDIOM_LEVELS = [
            { id: 1, type: 'idiom', name: "第一課", title: "初出茅廬", color: "bg-blue-500", icon: "fa-pencil" },
            { id: 2, type: 'idiom', name: "第二課", title: "漸入佳境", color: "bg-green-500", icon: "fa-feather" },
            { id: 3, type: 'idiom', name: "第三課", title: "得心應手", color: "bg-yellow-500", icon: "fa-bolt" },
            { id: 4, type: 'idiom', name: "第四課", title: "融會貫通", color: "bg-orange-500", icon: "fa-brain" },
            { id: 5, type: 'idiom', name: "第五課", title: "爐火純青", color: "bg-red-500", icon: "fa-fire" },
            { id: 6, type: 'idiom', name: "第六課", title: "一代宗師", color: "bg-purple-500", icon: "fa-crown" }
        ];

        // --- 新增閱讀測驗題庫 ---
        const READING_LEVELS = [
            { 
                id: 'R5', 
                type: 'reading', 
                category: '古文閱讀',
                name: "閱讀測驗-老子問疾", 
                title: "老子問疾", 
                color: "bg-indigo-500",
                icon: "fa-book-open",
                passage: "商容有疾，老子曰：「先生無遺教以告弟子乎？」容曰：「吾舌存乎？」曰：「存。」「吾齒存乎？」曰：「亡。」「知之乎？」老子曰：「非謂其剛亡而弱存乎？」容曰：「嘻，天下事盡矣！」\n\n語譯：老子去探望病重的哲人商容，並請教有關的哲學問題。商容張開口問道：「我的舌頭還在嗎？」老子說：「在。」商容又問：「我的牙齒還在嗎？」老子說：「沒有了。」商容說：「你知道這是什麼意思嗎？」老子說：「先生是想告訴我，牙齒因為剛硬而過早夭亡，舌頭因柔軟而長久存在這個道理嗎？」商容說：「對！你明白了天下的事理。」",
                questions: [
                    { question: "讀完本文，下列何者是「柔」的表現？", options: ["以牙還牙", "血氣方剛", "不留餘地", "以德報怨"], answer: "以德報怨" },
                    { question: "若以這則故事為題材，適用於下列哪一個題目？", options: ["談讀書", "水的韌性", "學與做", "機智的故事"], answer: "水的韌性" },
                    { question: "有關商容的敘述，何者正確？", options: ["老子是商容的老師", "商容所說的道理相近於以柔克剛", "商容責備了老子", "商容已經不能說話了"], answer: "商容所說的道理相近於以柔克剛" }
                ]
            },
            { 
                id: 'R6', 
                type: 'reading', 
                category: '品格故事',
                name: "閱讀測驗-無米樂", 
                title: "無米樂", 
                color: "bg-emerald-500",
                icon: "fa-seedling",
                passage: "台南後壁區有群農民，在收成不佳、甚至無米可收的情況下，依然能開朗大笑，這就是「無米樂」。崑濱伯說：「種田是在修行，風吹、日曬、雨淋，都是自然的恩賜。即便沒有米，心靈也要快樂。」這種樂天知命的精神，展現了台灣農民堅韌的生命力與對土地的敬畏。",
                questions: [
                    { question: "「無米樂」主要想表達什麼樣的人生觀？", options: ["隨便過日子", "樂天知命，勤奮不懈", "反正沒米，乾脆放棄", "積極爭取補助"], answer: "樂天知命，勤奮不懈" },
                    { question: "崑濱伯將種田比喻成什麼？", options: ["賺錢的工具", "辛苦的勞動", "一種修行", "無聊的遊戲"], answer: "一種修行" },
                    { question: "下列何者最符合「無米樂」的精神？", options: ["富裕生活", "怨天尤人", "知足常樂", "好逸惡勞"], answer: "知足常樂" },
                    { question: "文中提到的農民對待自然的態度為何？", options: ["對抗自然", "順應與敬畏", "漠不關心", "利用與破壞"], answer: "順應與敬畏" }
                ]
            },
            { 
                id: 'R7', 
                type: 'reading', 
                category: '品格故事',
                name: "閱讀測驗-賣菜阿嬤", 
                title: "賣菜阿嬤", 
                color: "bg-rose-500",
                icon: "fa-basket-shopping",
                passage: "陳樹菊阿嬤在台東市場賣菜超過五十年，她省吃儉用，卻將辛苦累積的近千萬元捐出蓋圖書館、認養孤兒。她曾說：「錢，要給需要的人才有用。」這種無私奉獻的精神，讓她登上了《時代雜誌》最具影響力人物榜，成為台灣最美麗的風景。",
                questions: [
                    { question: "陳樹菊阿嬤捐款的經費來源主要是？", options: ["中獎獎金", "賣菜所得", "企業捐助", "政府補助"], answer: "賣菜所得" },
                    { question: "阿嬤對「錢」的看法是什麼？", options: ["要存越多越好", "要留給子孫", "要給需要的人才有用", "錢是一切的痛苦來源"], answer: "要給需要的人才有用" },
                    { question: "陳樹菊阿嬤的精神可以用哪個詞形容？", options: ["揮金如土", "慷慨解囊", "唯利是圖", "一毛不拔"], answer: "慷慨解囊" }
                ]
            },
            { 
                id: 'R8', 
                type: 'reading', 
                category: '古文閱讀',
                name: "閱讀測驗-四時讀書樂", 
                title: "四時讀書樂", 
                color: "bg-amber-600",
                icon: "fa-sun",
                passage: "春：山光照檻水繞廊，舞雩歸詠春風香。好鳥枝頭亦朋友，落花水面皆文章。搓跎莫遣韶光老，人生唯有讀書好。\n夏：修竹壓簷桑柘沃，林間蟬噪覺幽獨。晨興理荒穢，帶月荷鋤歸。讀書之樂樂無窮，瑤琴一曲來薰風。\n秋：昨夜庭前葉有聲，籬豆花開蟋蟀鳴。不覺商意滿林薄，筆硯冷然書案清。讀書之樂樂如何？綠滿窗前草不除。\n冬：木落水盡千崖枯，迥然吾亦見真吾。坐對韋編燈火明，高歌六籍聖賢語。讀書之樂何處尋？數點梅花天地心。",
                questions: [
                    { question: "「落花水面皆文章」這句話是在形容春天的什麼景象？", options: ["到處都是垃圾", "自然景物皆可啟發靈感", "水面上寫滿了字", "花朵掉落很可惜"], answer: "自然景物皆可啟發靈感" },
                    { question: "文中不斷強調的核心主題是什麼？", options: ["四季的變化", "種田的辛苦", "讀書的快樂", "梅花的堅韌"], answer: "讀書的快樂" },
                    { question: "「搓跎莫遣韶光老」是在告誡我們？", options: ["不要浪費光陰", "要多出去玩", "老了就不能讀書", "春天很快就結束"], answer: "不要浪費光陰" }
                ]
            },
            { 
                id: 'R9', 
                type: 'reading', 
                category: '普吉島故事',
                name: "閱讀測驗-普吉島故事", 
                title: "普吉島故事", 
                color: "bg-cyan-500",
                icon: "fa-umbrella-beach",
                passage: "在普吉島的海灘上，一個十歲的小女孩發現海水突然退得很遠，她想起老師曾教過這是海嘯的前兆，於是立刻警告家人與周遭遊客。因為她的機智與勇氣，拯救了上百條性命。這個故事告訴我們，知識不僅是力量，更是救命的關鍵。",
                questions: [
                    { question: "小女孩能預警海嘯是因為？", options: ["她有超能力", "她看到了氣象預報", "她運用了學校學到的知識", "她是普吉島本地人"], answer: "她運用了學校學到的知識" },
                    { question: "海嘯發生前的預兆是什麼？", options: ["天色變黑", "海水突然退得很遠", "風力增強", "海豚跳出水面"], answer: "海水突然退得很遠" }
                ]
            },
            // 其他成語閱讀 1~12 (範例一篇，結構相同)
            { 
                id: 'R_IDM1', 
                type: 'reading', 
                category: '成語閱讀測驗',
                name: "閱讀測驗-齊威王納諫", 
                title: "齊威王納諫", 
                color: "bg-slate-500",
                icon: "fa-comments",
                passage: "齊國大臣鄒忌自認比徐公美，但在詢問妻、妾、客後，得到的都是讚美。事後他反思，是因為妻私他、妾畏他、客有求於他，所以才沒說真話。他以此勸誡齊威王，國內的人對君王也多有私、畏或有所求，聽到的多是假話。威王聽從建議，鼓勵進諫，最後讓齊國政治清明。",
                questions: [
                    { question: "鄒忌自認美不過誰？", options: ["齊威王", "城北徐公", "他的客鄰", "自己的妻子"], answer: "城北徐公" },
                    { question: "為何妻、妾、客都稱讚鄒忌？", options: ["他真的很帥", "因為私心、畏懼或有求於他", "因為他是大臣", "因為他們沒看過徐公"], answer: "因為私心、畏懼或有求於他" },
                    { question: "齊威王納諫的結果如何？", options: ["齊國滅亡", "政治清明，國力增強", "處罰了鄒忌", "徐公當了官"], answer: "政治清明，國力增強" }
                ]
            }
        ];

        // 工具：隨機洗牌
        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

        // ==========================================
        // 3. 主程式元件
        // ==========================================
        const App = () => {
            const [view, setView] = useState('login'); // login, lobby, playing, result
            const [userName, setUserName] = useState('');
            const [selectedLevel, setSelectedLevel] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [wrong, setWrong] = useState(0);
            const [timer, setTimer] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const intervalRef = useRef(null);

            // 處理進入關卡
            const startChallenge = (lvl) => {
                setSelectedLevel(lvl);
                if (lvl.type === 'reading') {
                    setQuestions(shuffle(lvl.questions));
                } else {
                    // 原有成語挑戰題目產生邏輯 (此處簡化示意)
                    setQuestions([{ question: "成語測試題目", options: ["A", "B", "C", "D"], answer: "A" }]);
                }
                setCurrentIndex(0);
                setScore(0);
                setWrong(0);
                setTimer(0);
                setView('playing');
                intervalRef.current = setInterval(() => setTimer(t => t + 1), 1000);
            };

            // 處理答題
            const handleAnswer = (ans) => {
                const isCorrect = ans === questions[currentIndex].answer;
                if (isCorrect) setScore(s => s + 1);
                else setWrong(w => w + 1);

                if (currentIndex < questions.length - 1) {
                    setCurrentIndex(currentIndex + 1);
                } else {
                    finishChallenge(isCorrect ? score + 1 : score, isCorrect ? wrong : wrong + 1);
                }
            };

            // 結束並紀錄
            const finishChallenge = async (finalS, finalW) => {
                clearInterval(intervalRef.current);
                setView('result');
                setIsSubmitting(true);

                const data = {
                    name: userName,
                    level: selectedLevel.name,
                    score: finalS,
                    wrong: finalW,
                    duration: timer
                };

                // 原有 GAS 上傳邏輯
                if (GAS_URL && GAS_URL.startsWith('http')) {
                    try {
                        await fetch(GAS_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                    } catch (e) { console.error("上傳失敗", e); }
                }
                setIsSubmitting(false);
            };

            // 登入介面
            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-indigo-50">
                    <div className="glass-card p-10 rounded-3xl w-full max-w-md text-center">
                        <i className="fa-solid fa-graduation-cap text-6xl text-primary mb-6"></i>
                        <h1 className="text-3xl font-black text-gray-800 mb-8">國小成語與閱讀系統</h1>
                        <input 
                            className="w-full p-4 border-2 border-indigo-100 rounded-2xl mb-6 text-xl text-center focus:border-primary outline-none"
                            placeholder="請輸入玩家姓名"
                            value={userName}
                            onChange={(e) => setUserName(e.target.value)}
                        />
                        <button 
                            className="w-full bg-primary text-white p-4 rounded-2xl text-xl font-bold btn-press shadow-lg"
                            onClick={() => userName && setView('lobby')}
                        >開始挑戰</button>
                    </div>
                </div>
            );

            // 大廳介面
            if (view === 'lobby') return (
                <div className="min-h-screen p-6 max-w-4xl mx-auto">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-2xl font-black text-gray-800">你好, {userName} 👋</h2>
                        <a href={SPREADSHEET_URL} target="_blank" className="text-primary font-bold"><i className="fa-solid fa-table"></i> 紀錄表</a>
                    </div>

                    {/* 成語關卡 */}
                    <h3 className="text-xl font-bold mb-4 text-indigo-600"><i className="fa-solid fa-pencil"></i> 成語課文挑戰</h3>
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                        {IDIOM_LEVELS.map(lvl => (
                            <button key={lvl.id} onClick={() => startChallenge(lvl)} className={`${lvl.color} text-white p-6 rounded-3xl btn-press shadow-md text-left relative overflow-hidden`}>
                                <i className={`fa-solid ${lvl.icon} absolute -right-4 -bottom-4 text-6xl opacity-20`}></i>
                                <div className="font-bold opacity-80">{lvl.name}</div>
                                <div className="text-xl font-black">{lvl.title}</div>
                            </button>
                        ))}
                    </div>

                    {/* 閱讀測驗專區 */}
                    <h3 className="text-xl font-bold mb-4 text-emerald-600"><i className="fa-solid fa-book-open"></i> 閱讀測驗專區</h3>
                    <div className="space-y-8">
                        {['古文閱讀', '品格故事', '普吉島故事', '成語閱讀測驗'].map(cat => (
                            <div key={cat}>
                                <h4 className="font-bold text-gray-500 mb-2 border-l-4 border-emerald-400 pl-2">{cat}</h4>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {READING_LEVELS.filter(r => r.category === cat).map(lvl => (
                                        <button key={lvl.id} onClick={() => startChallenge(lvl)} className="bg-white p-4 rounded-2xl flex items-center gap-4 shadow-sm border-2 border-emerald-50 hover:border-emerald-200 transition-all btn-press">
                                            <div className={`${lvl.color} w-12 h-12 rounded-xl flex items-center justify-center text-white`}>
                                                <i className={`fa-solid ${lvl.icon}`}></i>
                                            </div>
                                            <div className="text-left">
                                                <div className="font-bold text-gray-800">{lvl.title}</div>
                                                <div className="text-xs text-gray-400">{lvl.questions.length} 題測驗</div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // 挑戰中
            if (view === 'playing') {
                const q = questions[currentIndex];
                const isReading = selectedLevel.type === 'reading';
                const progress = ((currentIndex + 1) / questions.length) * 100;

                return (
                    <div className="h-screen flex flex-col bg-gray-100">
                        {/* 頂部資訊 */}
                        <div className="bg-white p-4 shadow-sm flex justify-between items-center shrink-0">
                            <button onClick={() => { if(confirm('確定要離開？')) setView('lobby'); }} className="text-gray-400"><i className="fa-solid fa-xmark text-xl"></i></button>
                            <div className="text-center">
                                <div className="text-xs font-bold text-gray-400">{selectedLevel.name}</div>
                                <div className="font-black text-primary">第 {currentIndex + 1} / {questions.length} 題</div>
                            </div>
                            <div className="font-mono font-bold text-primary bg-indigo-50 px-3 py-1 rounded-lg">
                                <i className="fa-regular fa-clock"></i> {timer}s
                            </div>
                        </div>

                        {/* 進度條 */}
                        <div className="w-full h-1.5 bg-gray-200">
                            <div className="h-full bg-primary transition-all duration-300" style={{width: `${progress}%`}}></div>
                        </div>

                        {/* 內容區：分割模式 */}
                        <div className="flex-1 flex flex-col overflow-hidden">
                            {isReading && (
                                <div className="h-[40vh] bg-paper p-6 overflow-y-auto custom-scroll border-b-2 border-orange-100 shrink-0">
                                    <h2 className="text-2xl font-black text-amber-900 mb-4 border-b border-amber-200 pb-2">{selectedLevel.title}</h2>
                                    <div className="text-lg text-amber-800 leading-[1.8] whitespace-pre-wrap">
                                        {selectedLevel.passage}
                                    </div>
                                </div>
                            )}

                            <div className="flex-1 p-6 overflow-y-auto">
                                <div className="bg-white p-6 rounded-3xl shadow-sm mb-6 border-2 border-indigo-50">
                                    <h3 className="text-xl font-bold text-gray-800 leading-relaxed">{q.question}</h3>
                                </div>
                                <div className="space-y-4">
                                    {q.options.map((opt, i) => (
                                        <button 
                                            key={i}
                                            onClick={() => handleAnswer(opt)}
                                            className="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl text-left text-lg font-bold text-gray-700 hover:border-primary hover:bg-indigo-50 transition-all btn-press flex items-center gap-4"
                                        >
                                            <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-primary shrink-0">{String.fromCharCode(65+i)}</div>
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // 結果介面
            if (view === 'result') {
                const total = score + wrong;
                const rate = Math.round((score / total) * 100);
                const isExcellent = rate >= 80;

                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-indigo-50">
                        <div className="glass-card p-10 rounded-[3rem] w-full max-w-md text-center">
                            {isExcellent && <div className="text-6xl mb-4 animate-bounce">🏆</div>}
                            <h2 className="text-3xl font-black text-gray-800 mb-2">{isExcellent ? '表現優異！' : '再接再厲！'}</h2>
                            <div className="text-6xl font-black text-primary mb-8">{rate}%</div>

                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-green-50 p-4 rounded-2xl">
                                    <div className="text-green-600 font-bold">答對</div>
                                    <div className="text-2xl font-black">{score}</div>
                                </div>
                                <div className="bg-red-50 p-4 rounded-2xl">
                                    <div className="text-red-600 font-bold">錯誤</div>
                                    <div className="text-2xl font-black">{wrong}</div>
                                </div>
                            </div>

                            <div className="text-gray-400 font-bold mb-8">總用時：{timer} 秒</div>

                            {isSubmitting ? (
                                <div className="text-primary font-bold animate-pulse">成績上傳中...</div>
                            ) : (
                                <div className="space-y-4">
                                    <button 
                                        className="w-full bg-primary text-white p-4 rounded-2xl text-xl font-bold btn-press shadow-lg"
                                        onClick={() => setView('lobby')}
                                    >返回大廳</button>
                                    {rate < 60 && (
                                        <button 
                                            className="w-full bg-white border-2 border-primary text-primary p-4 rounded-2xl text-xl font-bold btn-press"
                                            onClick={() => startChallenge(selectedLevel)}
                                        >重新挑戰</button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
