    <script type="text/babel">
        // ==========================================
        // 1. 設定與音效

        const GAS_URL = "https://script.google.com/macros/s/AKfycbwWbpVM-60wd4uTSKHyowk-TUJ97SU20ZtazfOBSOcmL0T6dovMW2G-vYzo7IxcJrVv_A/exec"; // 請填入部署後的網址

        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                const now = ctx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'combo') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554.37, now + 0.1);
                    osc.frequency.setValueAtTime(659.25, now + 0.2);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                }
            } catch (e) { console.error("音頻播放錯誤:", e); }
        };

        // 3.1 閱讀測驗題庫

            { question: "「無米樂」一文中，主角面對生活困境展現出何種態度？", options: ["怨天尤人", "聽天由命，消極面對", "樂天知命，勤奮不懈", "得過且過"], answer: "樂天知命，勤奮不懈" },
            { question: "老子與商容的故事中，商容張開嘴讓老子看，是想表達什麼哲理？", options: ["牙齒很堅硬", "舌頭很柔軟", "柔弱勝剛強", "說話要小心"], answer: "柔弱勝剛強" },

            { question: "商容藉由牙齒掉光而舌頭還在，主要是為了教導老子什麼事？", options: ["要好好刷牙", "堅硬的事物容易摧折，柔軟的事物才能長久", "年紀大了自然會掉牙", "舌頭比牙齒重要"], answer: "堅硬的事物容易摧折，柔軟的事物才能長久" },

            { question: "這幾篇文章的內容______，缺乏創意，令人覺得乏味。", options: ["文情並茂", "洛陽紙貴", "千篇一律", "一字千金"], answer: "千篇一律" },
            { question: "請選出與「文情並茂」意思相近的成語：", options: ["情文相生", "枯燥乏味", "言不及義", "連篇累牘"], answer: "情文相生" }

        // 3.3 修辭判斷題庫
        const rhetoricQuestions = [
            { question: "「路旁掉落的樹葉，像一隻隻金色的蝴蝶。」這句話使用了哪一種修辭？", options: ["誇飾", "譬喻", "擬人", "排比"], answer: "譬喻" },

        // 3.4 課文大意題庫
        const summaryQuestions = [
            { question: "《佐賀的超級阿嬤》一文中，阿嬤最主要的特質是什麼？", options: ["非常富有", "悲觀愛抱怨", "樂觀開朗，充滿生活智慧", "嚴厲不講理"], answer: "樂觀開朗，充滿生活智慧" },

        // 工具函數：洗牌
        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const renderHighlight = (text) => {
            if (!text) return null;
            const parts = text.split(/(「[^」]+」|【[^】]+】)/g);
            return parts.map((part, i) => {
                if (part.startsWith('「') || part.startsWith('【')) {
                    return <span key={i} className="text-secondary font-black text-[110%] mx-1 bg-yellow-100 px-2 rounded-xl shadow-sm border-b-4 border-yellow-200">{part}</span>;
                }
                return <span key={i}>{part}</span>;
            });
        };

        // 產生題目 (根據模式區分)
        const generateQuestions = (levelId, type) => {
            if (type === 'normal') {
                const idioms = IDIOM_DB[levelId] || IDIOM_DB[1];
                let qs = [];
                idioms.forEach(idiom => {
                    qs.push({
                        type: 'flash', idiom: idiom.text, meaning: idiom.meaning,
                        question: `請問「${idiom.text}」的意思是？`,
                        options: shuffleArray([idiom.meaning, "形容做事非常快速。", "比喻不聽從別人的建議。"]).slice(0,3),
                        answer: idiom.meaning
                    });
                    qs.push({
                        type: 'context', question: idiom.context.replace('______', '【______】'),
                        options: shuffleArray([idiom.text, "一席之地", "不知所云", "不疾不徐"]).slice(0,4),
                        answer: idiom.text
                    });
                    qs.push({
                        type: 'scramble', question: `請將下列文字重組成【正確的成語】：`,
                        chars: shuffleArray(idiom.text.split('')),
                        answer: idiom.text
                    });
                });
                return shuffleArray(qs).slice(0, 8); // 一般關卡抽8題
            } else if (type === 'exam') {
                let pool = [];
                if (levelId === 'exam-reading') pool = readingQuestions;
                if (levelId === 'exam-theme') pool = themeQuestions;
                if (levelId === 'exam-rhetoric') pool = rhetoricQuestions;
                if (levelId === 'exam-summary') pool = summaryQuestions;
                
                // 轉換為統一格式
                let qs = pool.map(q => ({
                    type: 'exam_mc',
                    question: q.question,
                    options: shuffleArray(q.options),
                    answer: q.answer
                }));
                return shuffleArray(qs).slice(0, 10); // 段考抽10題
            }
        };

        // ==========================================
        // 4. React 元件
        // ==========================================
        const App = () => {
            const [gameState, setGameState] = React.useState('login'); // login, modeSelect, levelSelect, playing, result
            const [gameMode, setGameMode] = React.useState('normal'); // normal, exam
            const [userInfo, setUserInfo] = React.useState({ name: '' });
            const [currentLevel, setCurrentLevel] = React.useState(null); // 存整個 level 物件
            
            const [questions, setQuestions] = React.useState([]);
            const [qIndex, setQIndex] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [wrongCount, setWrongCount] = React.useState(0);
            const [combo, setCombo] = React.useState(0);
            const [timeElapsed, setTimeElapsed] = React.useState(0);
            
            // 遊戲內狀態
            const [flashState, setFlashState] = React.useState('none');
            const [selectedChars, setSelectedChars] = React.useState([]);
            const [feedback, setFeedback] = React.useState(null); 
            const [isSaving, setIsSaving] = React.useState(false);

            const timerRef = React.useRef(null);

            // 計時器 (所有模式皆適用計時)
            React.useEffect(() => {
                if (gameState === 'playing' && flashState !== 'showing' && !feedback) {
                    timerRef.current = setInterval(() => setTimeElapsed(t => t + 1), 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [gameState, flashState, feedback]);

            // 快閃記憶控制
            React.useEffect(() => {
                if (gameState === 'playing' && questions[qIndex]?.type === 'flash' && flashState === 'none') {
                    setFlashState('showing');
                    setTimeout(() => setFlashState('answering'), 3000);
                }
            }, [gameState, qIndex, questions]);

            // 拆字重組自動提交
            React.useEffect(() => {
                if (gameState === 'playing' && questions[qIndex]?.type === 'scramble' && !feedback) {
                    if (selectedChars.length === questions[qIndex].answer.length) {
                        handleAnswer(selectedChars.map(c => c.char).join(''));
                    }
                }
            }, [selectedChars]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!userInfo.name) return;
                setGameState('modeSelect');
            };

            const selectMode = (mode) => {
                setGameMode(mode);
                setGameState('levelSelect');
            };

            const startLevel = (lvl) => {
                const qs = generateQuestions(lvl.id, lvl.type);
                setQuestions(qs);
                setCurrentLevel(lvl);
                setQIndex(0);
                setScore(0);
                setWrongCount(0);
                setCombo(0);
                setTimeElapsed(0);
                setFlashState('none');
                setSelectedChars([]);
                setFeedback(null);
                setGameState('playing');
            };

            const handleAnswer = (selectedAns) => {
                if (feedback) return;
                const currentQ = questions[qIndex];
                const isCorrect = selectedAns === currentQ.answer;

                setFeedback(isCorrect ? 'correct' : 'wrong');
                
                if (isCorrect) {
                    playSound('correct');
                    setScore(s => s + 1);
                    setCombo(c => {
                        const newC = c + 1;
                        if (newC >= 2) playSound('combo');
                        return newC;
                    });
                } else {
                    playSound('wrong');
                    setWrongCount(w => w + 1);
                    setCombo(0);
                }

                setTimeout(() => {
                    setFeedback(null);
                    setSelectedChars([]);
                    if (qIndex < questions.length - 1) {
                        setQIndex(prev => prev + 1);
                        setFlashState('none');
                    } else {
                        finishGame(score + (isCorrect ? 1 : 0), wrongCount + (isCorrect ? 0 : 1));
                    }
                }, 1200);
            };

            const finishGame = async (finalScore, finalWrong) => {
                setGameState('result');
                setIsSaving(true);
                
                // 決定 GAS 傳送的關卡名稱
                let levelNameForGas = currentLevel.type === 'normal' 
                    ? `第 ${currentLevel.id} 關` 
                    : currentLevel.name;

                const payload = {
                    name: userInfo.name,
                    level: levelNameForGas,
                    score: finalScore,
                    wrong: finalWrong,
                    duration: timeElapsed
                };

                // 檢查是否已設定真實的 GAS 網址 (以 http 開頭)
                if (GAS_URL && GAS_URL.startsWith('http')) {
                    try {
                        await fetch(GAS_URL, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });
                        console.log("成績上傳成功或請求已送出");
                    } catch (e) {
                        console.warn("上傳 GAS 時發生錯誤:", e);
                    } finally {
                        setIsSaving(false);
                    }
                } else {
                    // 若尚未設定真實網址，則略過上傳
                    console.log("提示：尚未設定 GAS_URL，本次成績不會上傳至試算表。");
                    // 稍微延遲以模擬本地儲存感受，直接完成結算
                    setTimeout(() => {
                        setIsSaving(false);
                    }, 500);
                }
            };

            // 渲染：登入
            if (gameState === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-card rounded-[2rem] p-10 max-w-lg w-full text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-40 bg-primary rounded-b-[50%] -z-10 transform -translate-y-20"></div>
                            <i className="fa-solid fa-graduation-cap mx-auto text-white text-[5rem] mb-8 relative z-10 -mt-2"></i>
                            <h1 className="text-5xl font-black text-primary mb-4 tracking-wider">成語大挑戰</h1>
                            <p className="text-gray-500 mb-10 text-xl font-bold bg-indigo-50 inline-block px-4 py-2 rounded-full border border-indigo-100">段考整合版 ‧ 作答紀錄</p>
                            
                            <form onSubmit={handleLogin} className="space-y-8">
                                <div className="w-full">
                                    <input type="text" required className="w-full p-5 rounded-2xl border-4 border-indigo-100 focus:border-primary focus:ring-4 outline-none text-3xl font-black text-gray-700 text-center shadow-inner"
                                        value={userInfo.name} onChange={e => setUserInfo({...userInfo, name: e.target.value})} placeholder="請輸入姓名" />
                                </div>
                                <button type="submit" className="w-full bg-primary text-white font-black text-3xl py-5 rounded-2xl btn-press flex justify-center items-center gap-3 hover:bg-indigo-700">
                                    <i className="fa-solid fa-rocket"></i> 進入系統
                                </button>
                                <a href={SPREADSHEET_URL} target="_blank" className="block text-indigo-500 font-bold text-lg hover:underline mt-4">
                                    <i className="fa-solid fa-table-list mr-1"></i> 觀看 Google 紀錄表
                                </a>
                            </form>
                        </div>
                    </div>
                );
            }

            // 渲染：模式選擇
            if (gameState === 'modeSelect') {
                return (
                    <div className="min-h-screen p-6 pb-20 flex flex-col items-center justify-center">
                        <h2 className="text-4xl md:text-5xl font-black text-primary mb-12 flex items-center gap-3">
                            <i className="fa-solid fa-gamepad"></i> 請選擇挑戰模式
                        </h2>
                        <div className="flex flex-col md:flex-row gap-8 w-full max-w-4xl">
                            <button onClick={() => selectMode('normal')} className="flex-1 glass-card p-10 rounded-[2rem] btn-press border-4 border-blue-200 hover:border-blue-400 group text-left relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-blue-100 rounded-bl-full -mr-10 -mt-10 opacity-50 transition-transform group-hover:scale-110"></div>
                                <i className="fa-solid fa-book-open text-6xl text-blue-500 mb-6 relative z-10"></i>
                                <h3 className="text-4xl font-black text-gray-800 mb-4 relative z-10">一般關卡</h3>
                                <p className="text-gray-500 font-bold text-xl relative z-10">第一至第六課成語<br/>包含快閃、錯字、重組題型</p>
                            </button>

                            <button onClick={() => selectMode('exam')} className="flex-1 glass-card p-10 rounded-[2rem] btn-press border-4 border-purple-200 hover:border-purple-400 group text-left relative overflow-hidden bg-gradient-to-br from-white to-purple-50">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-purple-200 rounded-bl-full -mr-10 -mt-10 opacity-50 transition-transform group-hover:scale-110"></div>
                                <i className="fa-solid fa-crown text-6xl text-exam mb-6 relative z-10"></i>
                                <h3 className="text-4xl font-black text-gray-800 mb-4 relative z-10">段考挑戰</h3>
                                <p className="text-gray-500 font-bold text-xl relative z-10">閱讀、修辭、大意與主題<br/>10題連發 測驗你的實力</p>
                                <span className="absolute bottom-6 right-6 bg-red-500 text-white font-black px-4 py-1 rounded-full text-sm animate-pulse">HOT</span>
                            </button>
                        </div>
                        <button onClick={() => setGameState('login')} className="mt-12 text-gray-400 font-bold text-xl hover:text-gray-600">返回登入</button>
                    </div>
                );
            }

            // 渲染：關卡選擇
            if (gameState === 'levelSelect') {
                const list = gameMode === 'normal' ? LEVELS : EXAM_LEVELS;
                const titleText = gameMode === 'normal' ? "選擇課文關卡" : "四大段考領域";
                
                return (
                    <div className="min-h-screen p-6 pb-20">
                        <div className="max-w-5xl mx-auto">
                            <div className="flex justify-between items-center mb-10 bg-white p-5 rounded-3xl shadow-sm border-4 border-indigo-50">
                                <div className="flex items-center gap-4">
                                    <div className="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center shadow-inner">
                                        <i className="fa-solid fa-user text-3xl text-primary"></i>
                                    </div>
                                    <div className="text-left">
                                        <div className="text-lg text-gray-500 font-bold">挑戰者</div>
                                        <div className="font-black text-3xl text-gray-800">{userInfo.name}</div>
                                    </div>
                                </div>
                                <button onClick={() => setGameState('modeSelect')} className="text-indigo-500 font-bold px-4 py-2 hover:bg-indigo-50 rounded-xl transition-colors">切換模式</button>
                            </div>

                            <h2 className="text-4xl font-black text-center text-primary mb-10 flex justify-center items-center gap-3">
                                {gameMode === 'normal' ? <i className="fa-solid fa-map"></i> : <i className="fa-solid fa-flag-checkered"></i>} 
                                {titleText}
                            </h2>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {list.map((lvl) => (
                                    <button key={lvl.id} onClick={() => startLevel(lvl)} 
                                        className={`glass-card p-8 rounded-[2rem] text-left btn-press relative overflow-hidden group border-4 border-white`}>
                                        <div className={`absolute top-0 right-0 w-32 h-32 rounded-bl-full -mr-6 -mt-6 opacity-20 transition-transform group-hover:scale-110 ${lvl.color}`}></div>
                                        <div className={`w-20 h-20 rounded-[1.5rem] flex items-center justify-center text-white mb-6 shadow-xl ${lvl.color}`}>
                                            {gameMode === 'normal' ? 
                                                <span className="text-4xl font-black">{lvl.id}</span> :
                                                <i className={`fa-solid ${lvl.icon} text-4xl`}></i>
                                            }
                                        </div>
                                        <h3 className="text-3xl font-black text-gray-800 mb-2">{lvl.title}</h3>
                                        <p className="text-gray-500 font-bold text-xl">{gameMode === 'normal' ? lvl.desc : lvl.name}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // 渲染：遊戲中
            if (gameState === 'playing') {
                const currentQ = questions[qIndex];
                const progress = ((qIndex) / questions.length) * 100;

                return (
                    <div className="min-h-screen flex flex-col bg-bgColor">
                        <div className="bg-white p-5 shadow-sm border-b-4 border-indigo-100 flex justify-between items-center sticky top-0 z-20">
                            <div className="flex flex-col text-left">
                                <span className={`text-sm md:text-base text-white font-bold px-3 py-1 rounded-full inline-block mb-1 w-max ${currentLevel.color}`}>
                                    {currentLevel.name}
                                </span>
                                <span className="font-black text-primary text-xl md:text-2xl tracking-wide">題號 {qIndex + 1} / {questions.length}</span>
                            </div>
                            
                            {combo >= 2 && (
                                <div className="absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2 animate-bounce">
                                    <i className="fa-solid fa-fire text-danger text-2xl md:text-3xl"></i>
                                    <span className="font-black text-2xl md:text-3xl combo-text italic">{combo} 連擊!</span>
                                </div>
                            )}

                            <div className="flex gap-4 items-center">
                                <div className="flex items-center gap-2 text-gray-500 font-bold font-mono text-xl bg-gray-50 px-4 py-2 rounded-2xl border-2 border-gray-100 shadow-inner">
                                    <i className="fa-solid fa-stopwatch text-indigo-400"></i> {Math.floor(timeElapsed / 60)}:{(timeElapsed % 60).toString().padStart(2, '0')}
                                </div>
                            </div>
                        </div>

                        <div className="h-4 bg-indigo-100 w-full">
                            <div className="h-full bg-success transition-all duration-500 ease-out rounded-r-full shadow-inner" style={{ width: `${progress}%` }}></div>
                        </div>

                        <div className="flex-1 p-4 md:p-10 flex items-center justify-center relative">
                            {feedback && (
                                <div className="absolute inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm animate-pop">
                                    <div className="text-center">
                                        {feedback === 'correct' ? (
                                            <div className="bg-success text-white w-32 h-32 md:w-40 md:h-40 rounded-full flex items-center justify-center mx-auto shadow-2xl border-8 border-green-200">
                                                <i className="fa-solid fa-check text-6xl md:text-7xl"></i>
                                            </div>
                                        ) : (
                                            <div className="bg-danger text-white w-32 h-32 md:w-40 md:h-40 rounded-full flex items-center justify-center mx-auto shadow-2xl border-8 border-red-200">
                                                <i className="fa-solid fa-xmark text-6xl md:text-7xl"></i>
                                            </div>
                                        )}
                                        <h2 className={`text-4xl md:text-6xl font-black mt-8 tracking-widest ${feedback === 'correct' ? 'text-success' : 'text-danger'}`}>
                                            {feedback === 'correct' ? '太棒了！' : '哎呀，錯了！'}
                                        </h2>
                                    </div>
                                </div>
                            )}

                            <div className="w-full max-w-4xl">
                                {/* 題型1: 快閃 */}
                                {currentQ.type === 'flash' && (
                                    <div className="text-center">
                                        {flashState === 'showing' ? (
                                            <div className="glass-card p-10 md:p-16 rounded-[3rem] animate-pulse-fast border-secondary border-8">
                                                <div className="inline-block bg-secondary text-white px-6 py-2 rounded-full font-black text-xl mb-10">快閃記憶</div>
                                                <h2 className="text-6xl md:text-[6rem] font-black text-primary tracking-widest mb-10">{currentQ.idiom}</h2>
                                                <p className="text-2xl md:text-4xl text-gray-700 font-bold bg-indigo-50 p-6 rounded-3xl border-4 border-indigo-100">{currentQ.meaning}</p>
                                            </div>
                                        ) : (
                                            <div className="animate-pop">
                                                <h3 className="text-3xl font-black text-gray-800 mb-8 bg-white p-6 rounded-3xl shadow-sm border-2 border-indigo-50">{renderHighlight(currentQ.question)}</h3>
                                                <div className="space-y-4">
                                                    {currentQ.options.map((opt, i) => (
                                                        <button key={i} onClick={() => handleAnswer(opt)} className="w-full text-left p-6 glass-card rounded-3xl font-bold text-2xl text-gray-700 btn-press flex items-center gap-6 hover:bg-indigo-50">
                                                            <div className="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-primary shrink-0">{String.fromCharCode(65+i)}</div>
                                                            <span className="leading-snug">{opt}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* 題型2: 情境/填空 */}
                                {currentQ.type === 'context' && (
                                    <div className="animate-pop">
                                        <div className="mb-10 bg-white p-8 rounded-3xl shadow-sm border-4 border-indigo-50 text-center">
                                            <h3 className="text-3xl md:text-4xl font-black text-gray-800 leading-relaxed">{renderHighlight(currentQ.question)}</h3>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {currentQ.options.map((opt, i) => (
                                                <button key={i} onClick={() => handleAnswer(opt)} className="p-6 glass-card rounded-3xl font-bold text-3xl text-gray-700 btn-press flex items-center justify-center gap-4 hover:bg-indigo-50">
                                                    <span>{opt}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* 題型3: 拆字 */}
                                {currentQ.type === 'scramble' && (
                                    <div className="animate-pop text-center">
                                        <h3 className="text-2xl md:text-3xl font-black text-gray-800 mb-8 bg-white p-6 rounded-3xl shadow-sm border-2 border-indigo-50">{renderHighlight(currentQ.question)}</h3>
                                        <div className="flex justify-center gap-3 md:gap-6 mb-10">
                                            {Array.from({length: currentQ.answer.length}).map((_, i) => (
                                                <button key={`slot-${i}`} onClick={() => {
                                                    setSelectedChars(selectedChars.filter((_, idx) => idx !== i));
                                                }} className={`char-slot transition-all ${selectedChars[i] ? 'border-solid border-primary bg-indigo-50 border-4' : 'bg-white'}`}>
                                                    {selectedChars[i] ? selectedChars[i].char : ''}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="flex justify-center flex-wrap gap-4 md:gap-6 bg-white p-8 rounded-[2rem] shadow-sm">
                                            {currentQ.chars.map((char, i) => {
                                                const isSelected = selectedChars.some(sc => sc.index === i);
                                                return (
                                                    <button key={`char-${i}`} disabled={isSelected} onClick={() => {
                                                        if (selectedChars.length < currentQ.answer.length) setSelectedChars([...selectedChars, {char, index: i}]);
                                                    }}
                                                    className={`w-16 h-16 md:w-24 md:h-24 rounded-[1rem] md:rounded-[1.5rem] text-3xl md:text-5xl font-black flex items-center justify-center border-b-8 ${isSelected ? 'bg-gray-100 text-gray-300 border-gray-200 translate-y-2' : 'bg-primary text-white border-indigo-800 shadow-xl btn-press'}`}>
                                                        {char}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* 題型4: 段考單選題 */}
                                {currentQ.type === 'exam_mc' && (
                                    <div className="animate-pop">
                                        <div className="mb-8 bg-white p-6 md:p-10 rounded-3xl shadow-sm border-t-8 border-indigo-500">
                                            <h3 className="text-2xl md:text-4xl font-black text-gray-800 leading-relaxed text-left">{currentQ.question}</h3>
                                        </div>
                                        <div className="space-y-4">
                                            {currentQ.options.map((opt, i) => (
                                                <button key={i} onClick={() => handleAnswer(opt)} className="w-full text-left p-5 md:p-6 glass-card rounded-2xl md:rounded-3xl font-bold text-xl md:text-2xl text-gray-700 btn-press flex items-center gap-4 border-2 border-transparent hover:border-indigo-300 hover:bg-indigo-50 transition-colors">
                                                    <div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-indigo-100 flex items-center justify-center text-primary text-xl shrink-0 border-2 border-indigo-200">{String.fromCharCode(65+i)}</div>
                                                    <span className="leading-snug">{opt}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // 渲染：結果與成績分析
            if (gameState === 'result') {
                const totalQ = score + wrongCount;
                const percentage = totalQ === 0 ? 0 : Math.round((score / totalQ) * 100);
                
                let rank = ""; let rankColor = ""; let rankIcon = "";
                if (percentage >= 90) { rank = "成語大師"; rankColor = "text-purple-600"; rankIcon = "fa-crown"; }
                else if (percentage >= 80) { rank = "成語高手"; rankColor = "text-blue-500"; rankIcon = "fa-medal"; }
                else if (percentage >= 70) { rank = "成語學徒"; rankColor = "text-green-500"; rankIcon = "fa-star"; }
                else { rank = "繼續努力"; rankColor = "text-orange-500"; rankIcon = "fa-dumbbell"; }

                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-b from-bgColor to-indigo-100">
                        <div className="glass-card rounded-[3rem] p-8 md:p-12 max-w-2xl w-full text-center border-8 border-white relative overflow-hidden">
                            
                            {/* 等級徽章 */}
                            <div className="absolute top-0 right-0 w-32 h-32 bg-yellow-300 rounded-bl-full -mr-8 -mt-8 shadow-inner flex items-center justify-center">
                                <span className="text-2xl font-black text-yellow-800 -ml-4 mt-4 transform rotate-12">{percentage}分</span>
                            </div>

                            <div className={`mx-auto w-32 h-32 md:w-40 md:h-40 rounded-full flex items-center justify-center mb-6 shadow-2xl animate-bounce bg-white border-8 ${percentage >= 80 ? 'border-yellow-400' : 'border-gray-200'}`}>
                                <i className={`fa-solid ${rankIcon} text-6xl md:text-7xl ${rankColor}`}></i>
                            </div>
                            
                            <h2 className="text-3xl font-bold text-gray-500 mb-2">本次評級</h2>
                            <h1 className={`text-5xl md:text-6xl font-black mb-8 tracking-widest rank-badge ${rankColor}`}>{rank}</h1>
                            
                            <div className="grid grid-cols-2 gap-4 md:gap-6 mb-8">
                                <div className="bg-white p-6 rounded-3xl border-4 border-green-100 shadow-sm">
                                    <div className="text-green-500 text-lg md:text-xl font-black mb-1">答對題數</div>
                                    <div className="text-4xl md:text-5xl font-black text-gray-800">{score}</div>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border-4 border-red-100 shadow-sm">
                                    <div className="text-red-500 text-lg md:text-xl font-black mb-1">錯誤題數</div>
                                    <div className="text-4xl md:text-5xl font-black text-gray-800">{wrongCount}</div>
                                </div>
                            </div>

                            <div className="mb-10 text-xl font-bold text-gray-600 flex items-center justify-center gap-3 bg-white py-3 rounded-full shadow-inner border-2 border-gray-100">
                                <i className="fa-solid fa-stopwatch text-indigo-400 text-2xl"></i>
                                總共花費：{Math.floor(timeElapsed / 60)} 分 {(timeElapsed % 60)} 秒
                            </div>

                            {isSaving ? (
                                <div className="w-full bg-gray-200 text-gray-500 font-black text-2xl py-5 rounded-2xl flex justify-center items-center gap-3">
                                    <div className="loading-spinner border-t-indigo-500"></div>
                                    成績處理中...
                                </div>
                            ) : (
                                <div className="flex flex-col gap-4">
                                    <button onClick={() => setGameState('levelSelect')} className="w-full bg-primary text-white font-black text-2xl py-5 rounded-2xl btn-press flex justify-center items-center gap-2 hover:bg-indigo-700">
                                        <i className="fa-solid fa-rotate-right"></i> 繼續挑戰
                                    </button>
                                    <a href={SPREADSHEET_URL} target="_blank" className="w-full bg-success text-white font-black text-2xl py-5 rounded-2xl btn-press flex justify-center items-center gap-3 hover:bg-green-600">
                                        <i className="fa-solid fa-file-excel"></i> 檢查紀錄表
                                    </a>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
